<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Verifier — settings</title>
    <style>
      body { font: 14px system-ui, sans-serif; padding: 24px; max-width: 480px; }
      label { display: block; margin: 12px 0 4px; font-weight: 600; }
      input { width: 100%; padding: 8px; box-sizing: border-box; }
      button { margin-top: 16px; padding: 8px 16px; cursor: pointer; }
      .status { margin-top: 12px; font-size: 13px; color: #555; }
    </style>
  </head>
  <body>
    <h2>Verifier — capture settings</h2>
    <p>Backend the extension ships LinkedIn captures to.</p>
    <label for="backend">Backend URL</label>
    <input id="backend" type="text" placeholder="http://localhost:8001" />
    <button id="save">Save</button>
    <div class="status" id="status"></div>
    <script src="options.js"></script>
  </body>
</html>
